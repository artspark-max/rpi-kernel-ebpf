name: Build RPi6 Kernel with eBPF uprobe

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'RPi kernel branch'
        required: true
        default: 'rpi-6.18.y'
      localversion:
        description: 'Local version suffix'
        required: true
        default: '-v8-ebpf'

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    steps:
      - name: 📥 Checkout config repo first
        uses: actions/checkout@v4
        with:
          repository: artspark-max/rpi-kernel-ebpf
          ref: main
          path: config-repo
          fetch-depth: 1

      - name: 📥 Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/linux
          ref: ${{ github.event.inputs.kernel_branch }}
          path: kernel-source
          fetch-depth: 1

      - name: 🔧 Install cross-compile deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            crossbuild-essential-arm64 \
            bc kmod cpio flex bison libssl-dev libncurses-dev \
            device-tree-compiler python3 rsync git
          aarch64-linux-gnu-gcc --version | head -1
          echo "Dependencies done"

      - name: ⚙️ Apply custom config with UPROBE_EVENTS
        run: |
          cd kernel-source
          
          # Copy our saved config from config-repo
          cp $GITHUB_WORKSPACE/config-repo/kernel_config_rpi-v8 .config
          
          # Enable uprobe events (key change for eBPF TLS hooking)
          sed -i 's/# CONFIG_UPROBE_EVENTS is not set/CONFIG_UPROBE_EVENTS=y/' .config
          
          # Set custom version string
          sed -i "s/CONFIG_LOCALVERSION=\"-v8\"/CONFIG_LOCALVERSION=\"${{ github.event.inputs.localversion }}\"/" .config
          
          # Refresh config
          make ARCH=arm64 olddefconfig
          
          # Verify
          echo "=== UPROBE_EVENTS ==="
          grep CONFIG_UPROBE_EVENTS .config
          echo "=== BPF related ==="
          grep "^CONFIG_BPF\|CONFIG_UPROBE" .config
          echo "=== Local version ==="
          grep CONFIG_LOCALVERSION .config
          echo "=== Done ==="
          wc -l .config

      - name: 🏗️ Build kernel Image + modules + DTBs
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Build (parallel, ~20 min)
          make -j$(nproc) Image modules dtbs 2>&1 | tail -30
          
          echo "=== Build result ==="
          ls -lh arch/arm64/boot/Image
          file arch/arm64/boot/Image

      - name: 📦 Package kernel for RPi
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          PKG=/tmp/kernel-pkg
          mkdir -p $PKG/boot/overlays $PKG/lib/firmware
          
          # Copy kernel Image (RPi8 convention = kernel8)
          cp arch/arm64/boot/Image $PKG/boot/kernel8-ebpf.img
          
          # Copy DTBs
          cp arch/arm64/boot/dts/broadcom/*.dtb $PKG/boot/ 2>/dev/null || true
          cp arch/arm64/boot/dts/overlays/*.dtbo $PKG/boot/overlays/ 2>/dev/null || true
          
          # Install modules
          make INSTALL_MOD_PATH=$PKG modules_install 2>&1 | tail -5
          
          # Save config for reference
          cp .config $PKG/boot/config-6.18-ebpf
          
          # Build info
          echo "Kernel: $(cat include/config/kernel.release)" > $PKG/boot/ebpf-build-info.txt
          echo "UPROBE_EVENTS: enabled" >> $PKG/boot/ebpf-build-info.txt
          echo "Branch: ${{ github.event.inputs.kernel_branch }}" >> $PKG/boot/ebpf-build-info.txt
          echo "Date: $(date -u)" >> $PKG/boot/ebpf-build-info.txt
          
          # Create tarball
          cd $PKG && tar -czf /tmp/rpi-kernel-ebpf.tar.gz .
          
          echo "=== Package tree ==="
          tar -tzf /tmp/rpi-kernel-ebpf.tar.gz | head -40
          echo "..."
          ls -lh /tmp/rpi-kernel-ebpf.tar.gz

      - name: 📤 Upload full kernel package
        uses: actions/upload-artifact@v4
        with:
          name: rpi-kernel-ebpf-package
          path: /tmp/rpi-kernel-ebpf.tar.gz
          retention-days: 7

      - name: 📤 Upload kernel Image only
        uses: actions/upload-artifact@v4
        with:
          name: rpi-kernel-Image
          path: kernel-source/arch/arm64/boot/Image
          retention-days: 7
